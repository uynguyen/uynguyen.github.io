<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SignalHub Pro — Checkout</title>
  <script src="https://cdn.paddle.com/paddle/v2/paddle.js"></script>
  <style>
    :root { color-scheme: light dark; }
    body {
      margin: 0; min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f1115; color: #e7e9ee;
    }
    main { text-align: center; padding: 32px; max-width: 420px; }
    h1 { font-size: 22px; margin: 0 0 8px; }
    p  { font-size: 14px; color: #9aa0ab; line-height: 1.5; }
    .spinner {
      width: 28px; height: 28px; margin: 0 auto 18px;
      border: 3px solid rgba(255,255,255,.15); border-top-color: #6c8cff;
      border-radius: 50%; animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <main>
    <div class="spinner"></div>
    <h1>SignalHub Pro</h1>
    <p id="status">Opening secure checkout…</p>
  </main>

  <script>
    // ── Configure ────────────────────────────────────────────────────────
    // Remove this line when you go live (production).
    Paddle.Environment.set("sandbox");

    Paddle.Initialize({
      // Paddle → Developer Tools → Authentication → CLIENT-SIDE TOKENS.
      // This is the public client token (starts with `test_` in sandbox,
      // `live_` in production) — NOT your secret API key.
      token: "test_de9e48ad5298372e5a0e47bd8c0",
      eventCallback: function (event) {
        if (event.name === "checkout.completed") {
          document.getElementById("status").textContent =
            "Payment complete! Return to SignalHub — your Pro features are unlocking.";
        }
      },
    });
    // ─────────────────────────────────────────────────────────────────────

    // Paddle redirects here as `<this page>?_ptxn=<transaction id>`. We read
    // that and open the overlay for the transaction the app created.
    const txn = new URLSearchParams(window.location.search).get("_ptxn");
    if (txn) {
      Paddle.Checkout.open({ transactionId: txn });
    } else {
      document.getElementById("status").textContent =
        "No checkout in progress. Open this page from the SignalHub app.";
    }
  </script>
</body>
</html>
