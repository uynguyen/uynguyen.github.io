<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SignalHub — Reset Password</title>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f1115; color: #e7e9ee;
    }
    main { width: 100%; max-width: 380px; padding: 32px; text-align: center; }
    h1 { font-size: 22px; margin: 0 0 6px; }
    p  { font-size: 13.5px; color: #9aa0ab; line-height: 1.5; margin: 0 0 20px; }
    .logo {
      width: 56px; height: 56px; margin: 0 auto 16px; border-radius: 14px;
      background: linear-gradient(135deg, #23B6E6, #02D39A);
      display: flex; align-items: center; justify-content: center;
      font-size: 26px;
    }
    form { display: flex; flex-direction: column; gap: 12px; text-align: left; }
    label { font-size: 12px; color: #9aa0ab; margin-bottom: -6px; }
    input[type=password] {
      width: 100%; padding: 11px 12px; font-size: 14px;
      border-radius: 10px; border: 1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.05); color: #e7e9ee; outline: none;
    }
    input[type=password]:focus { border-color: #23B6E6; }
    button {
      margin-top: 6px; padding: 12px; font-size: 14px; font-weight: 600;
      border: none; border-radius: 10px; color: #fff; cursor: pointer;
      background: linear-gradient(135deg, #23B6E6, #02D39A);
    }
    button:disabled { opacity: .55; cursor: default; }
    .msg { font-size: 12.5px; margin-top: 4px; min-height: 16px; line-height: 1.4; }
    .msg.error { color: #ff7a7a; }
    .msg.ok    { color: #02D39A; }
    .spinner {
      width: 26px; height: 26px; margin: 0 auto 16px;
      border: 3px solid rgba(255,255,255,.15); border-top-color: #23B6E6;
      border-radius: 50%; animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hidden { display: none; }
  </style>
</head>
<body>
  <main>
    <div class="logo">🔑</div>
    <h1>Reset your password</h1>
    <p id="subtitle">Choose a new password for your SignalHub account.</p>

    <form id="form" class="hidden" autocomplete="off">
      <label for="pw">New password</label>
      <input id="pw" type="password" autocomplete="new-password" placeholder="At least 8 characters" />
      <label for="pw2">Confirm new password</label>
      <input id="pw2" type="password" autocomplete="new-password" placeholder="Re-enter password" />
      <button id="submit" type="submit">Update password</button>
      <div id="msg" class="msg"></div>
    </form>

    <div id="done" class="hidden">
      <div class="msg ok" style="font-size:14px;">
        Your password has been updated.<br />
        Return to the SignalHub app and sign in with your new password.
      </div>
    </div>
  </main>

  <script>
    // ── Project anon keys ─────────────────────────────────────────────────
    // PUBLISHABLE keys (same ones shipped in the app binary). GoTrue requires
    // an `apikey` header on every request; we pick the right one by reading
    // the project ref out of the recovery token's issuer, so this single page
    // serves both the dev and prod Supabase projects.
    const ANON_KEYS = {
      "jexdxnoylpcdisfkyiee": "sb_publishable_84jJnleMuCj-t1RtD07kAQ_m5sIHXNK", // dev
      "tscijogpqlsdzvbtvadw": "sb_publishable_VtimZk9Vq5oqPyHDdTG2bg__5iapxzL", // prod
    };
    // ──────────────────────────────────────────────────────────────────────

    const subtitle = document.getElementById("subtitle");
    const form     = document.getElementById("form");
    const done     = document.getElementById("done");
    const msg      = document.getElementById("msg");
    const submit   = document.getElementById("submit");

    function fail(text) {
      subtitle.textContent = text;
      subtitle.classList.add("error", "msg");
    }

    // Supabase returns the recovery token in the URL *fragment*
    // (#access_token=…&type=recovery), or an error fragment if the link is
    // expired/used (#error=…&error_description=…).
    const hash = new URLSearchParams(window.location.hash.slice(1));

    if (hash.get("error")) {
      fail(decodeURIComponent(
        hash.get("error_description") || hash.get("error"))
        .replace(/\+/g, " ") +
        ". Request a new reset link from the app.");
    }

    const accessToken = hash.get("access_token");
    const type = hash.get("type");

    if (!accessToken || type !== "recovery") {
      if (!hash.get("error")) {
        fail("This page opens from the password-reset link in your email. " +
             "Request one from the SignalHub app under Sign In → Forgot password?");
      }
    } else {
      // Derive the Supabase base URL + project ref from the token issuer so we
      // hit the correct project without hardcoding a single environment.
      let baseURL, ref;
      try {
        const payload = JSON.parse(
          atob(accessToken.split(".")[1].replace(/-/g, "+").replace(/_/g, "/")));
        const iss = payload.iss;                       // …supabase.co/auth/v1
        baseURL = iss.replace(/\/auth\/v1\/?$/, "");    // …supabase.co
        ref = new URL(baseURL).hostname.split(".")[0];  // project ref
      } catch (e) {
        fail("Couldn't read the reset link. Request a new one from the app.");
      }

      const anonKey = ANON_KEYS[ref];
      if (baseURL && !anonKey) {
        fail("Unrecognized account project. Request a new reset link from the app.");
      } else if (baseURL && anonKey) {
        form.classList.remove("hidden");
        document.getElementById("pw").focus();

        form.addEventListener("submit", async (e) => {
          e.preventDefault();
          const pw  = document.getElementById("pw").value;
          const pw2 = document.getElementById("pw2").value;

          msg.className = "msg error";
          if (pw.length < 8) { msg.textContent = "Use at least 8 characters."; return; }
          if (pw !== pw2)    { msg.textContent = "Passwords don't match."; return; }

          submit.disabled = true;
          msg.className = "msg";
          msg.textContent = "Updating…";

          try {
            const res = await fetch(baseURL + "/auth/v1/user", {
              method: "PUT",
              headers: {
                "Content-Type": "application/json",
                "apikey": anonKey,
                "Authorization": "Bearer " + accessToken,
              },
              body: JSON.stringify({ password: pw }),
            });
            if (!res.ok) {
              let detail = "Couldn't update password.";
              try {
                const j = await res.json();
                detail = j.msg || j.error_description || j.message || detail;
                if (res.status === 401 || res.status === 403) {
                  detail = "This reset link has expired. Request a new one from the app.";
                }
              } catch (_) {}
              msg.className = "msg error";
              msg.textContent = detail;
              submit.disabled = false;
              return;
            }
            form.classList.add("hidden");
            subtitle.classList.add("hidden");
            done.classList.remove("hidden");
          } catch (err) {
            msg.className = "msg error";
            msg.textContent = "Network error. Please try again.";
            submit.disabled = false;
          }
        });
      }
    }
  </script>
</body>
</html>
